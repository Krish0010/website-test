<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPACT Partner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #16A34A; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Mobile optimization for input focus to prevent zooming on iOS */
        @media screen and (max-width: 768px) {
            input { font-size: 16px !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-6">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="bg-gray-900 text-white p-6 sm:p-8 text-center">
            <h1 class="text-xl sm:text-2xl font-extrabold tracking-widest mb-1">FOODSTORYTVC</h1>
            <p class="text-[10px] sm:text-xs text-green-500 font-bold tracking-[0.2em] uppercase">IMPACT Partner Portal</p>
            <div class="mt-4 inline-block px-4 py-1 rounded-full bg-gray-800 border border-gray-700">
                <p id="restaurant-name-display" class="text-gray-300 text-sm font-medium"></p>
            </div>
        </div>

        <div id="redemption-section" class="p-6 sm:p-8">
            <label for="discount-code" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-2">Enter Customer Code</label>
            
            <div class="relative flex items-center">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span class="text-gray-400 font-bold text-lg">IMPACT-</span>
                </div>
                <input type="text" id="discount-code" placeholder="A1B2C" 
                    class="w-full pl-[92px] pr-4 py-4 text-lg font-bold border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none uppercase transition-all tracking-widest" 
                    autocomplete="off" inputmode="text">
            </div>
            
            <button id="verify-btn" onclick="verifyCode()" class="mt-4 w-full bg-gray-900 text-white font-bold py-4 px-4 rounded-xl hover:bg-black active:scale-[0.98] transition-all flex justify-center items-center shadow-lg">
                <span id="verify-text">Verify Code</span>
                <span id="verify-loader" class="loader hidden"></span>
            </button>

            <div id="error-message" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-xl text-xs font-bold border border-red-100 text-center uppercase tracking-tight"></div>
            
            <div id="result-card" class="hidden mt-6 border-t border-gray-100 pt-6 animate-in fade-in slide-in-from-bottom-2 duration-300">
                <div class="bg-gray-50 rounded-2xl p-5 border border-gray-100">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Customer Offer</p>
                            <p id="result-offer" class="text-xl font-extrabold text-gray-900 leading-tight"></p>
                        </div>
                        <span id="result-badge" class="px-3 py-1 rounded-lg text-[10px] font-black tracking-tighter"></span>
                    </div>
                    
                    <div class="mb-6">
                        <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Customer Details</p>
                        <p id="result-customer" class="text-sm font-semibold text-gray-700 break-all"></p>
                    </div>
                    
                    <button id="redeem-btn" onclick="redeemCode()" class="w-full bg-green-600 text-white font-bold py-4 px-4 rounded-xl shadow-md hover:bg-green-700 active:scale-[0.98] transition-all flex justify-center items-center">
                        <span id="redeem-text">Confirm Redemption</span>
                        <span id="redeem-loader" class="loader hidden" style="border-top-color: white;"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeuOI9M-8uSyinsShfSx09Ii2djMuXsd0oDO1W72TPH7H771IK3EsLMXA45JhqknDEjA/exec"; 
        const RESTAURANT_NAME = "Demo Resto"; 

        let currentlyVerifiedCode = "";

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('restaurant-name-display').innerText = RESTAURANT_NAME;
        });

        async function verifyCode() {
            const rawInput = document.getElementById('discount-code').value.trim();
            const errorMsg = document.getElementById('error-message');
            const resultCard = document.getElementById('result-card');
            
            if (!rawInput) return;

            // Automatically prepend IMPACT- to the input value for the API call
            const fullCode = "IMPACT-" + rawInput.toUpperCase();

            errorMsg.classList.add('hidden');
            resultCard.classList.add('hidden');
            toggleLoading('verify-btn', 'verify-text', 'verify-loader', true);

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${fullCode}&restaurant=${RESTAURANT_NAME}&action=verify`);
                const data = await response.json();

                if (data.success) {
                    showResultCard(data.data, fullCode);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection Error. Try again.");
            } finally {
                toggleLoading('verify-btn', 'verify-text', 'verify-loader', false);
            }
        }

        async function redeemCode() {
            if (!currentlyVerifiedCode) return;

            const errorMsg = document.getElementById('error-message');
            toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', true);
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${currentlyVerifiedCode}&restaurant=${RESTAURANT_NAME}&action=redeem`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('result-badge').innerText = "REDEEMED";
                    document.getElementById('result-badge').className = "px-3 py-1 rounded-lg text-[10px] font-black bg-gray-200 text-gray-500";
                    document.getElementById('redeem-btn').style.display = 'none'; 
                    alert("Success! Offer Redeemed.");
                    document.getElementById('discount-code').value = '';
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Network error.");
            } finally {
                toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', false);
            }
        }

        function showResultCard(data, code) {
            currentlyVerifiedCode = code;
            document.getElementById('result-offer').innerText = data.offer;
            document.getElementById('result-customer').innerText = data.customer;
            
            const badge = document.getElementById('result-badge');
            const redeemBtn = document.getElementById('redeem-btn');
            
            const status = data.status.toLowerCase();
            if (status === 'valid') {
                badge.innerText = "VALID OFFER";
                badge.className = "px-3 py-1 rounded-lg text-[10px] font-black bg-green-100 text-green-700 border border-green-200";
                redeemBtn.style.display = 'flex'; 
            } else if (status === 'redeemed') {
                badge.innerText = "USED ALREADY";
                badge.className = "px-3 py-1 rounded-lg text-[10px] font-black bg-gray-100 text-gray-500 border border-gray-200";
                redeemBtn.style.display = 'none'; 
            } else {
                badge.innerText = "EXPIRED";
                badge.className = "px-3 py-1 rounded-lg text-[10px] font-black bg-red-100 text-red-700 border border-red-200";
                redeemBtn.style.display = 'none'; 
            }

            document.getElementById('result-card').classList.remove('hidden');
        }

        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.innerText = message;
            errorMsg.classList.remove('hidden');
        }

        function toggleLoading(btnId, textId, loaderId, isLoading) {
            const btnText = document.getElementById(textId);
            const loader = document.getElementById(loaderId);
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btnText.classList.add('hidden');
                loader.classList.remove('hidden');
                btn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
