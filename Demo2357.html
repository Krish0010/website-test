<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPACT Partner Portal | FOODSTORYTVC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-base-black': '#0a0a0a',      /* Deep textured background color */
                        'brand-card-black': '#141414',      /* Slightly lighter for the main card */
                        'brand-gold': '#e8c064',            /* The vibrant foodstorytvc golden yellow */
                        'brand-gold-muted': '#e8c06440',    /* Muted gold for borders and subtle elements */
                    },
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: #e8c064; 
        }
        
        /* Premium subtle noise/texture overlay for the background */
        .page-textured-overlay {
            background-image: 
                linear-gradient(rgba(10, 10, 10, 0.95), rgba(10, 10, 10, 0.95)), 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .loader { 
            border: 3px solid #141414; 
            border-top: 3px solid #e8c064; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
            display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom styling to remove the blue outline on focus */
        input:focus { outline: none; box-shadow: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 page-textured-overlay">

    <div class="w-full max-w-md bg-brand-card-black rounded-3xl shadow-[0_10px_40px_-10px_rgba(232,192,100,0.15)] overflow-hidden border border-brand-gold-muted">
        
        <div class="p-6 sm:p-8 text-center border-b border-brand-gold-muted">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-widest mb-1 text-brand-gold">FOODSTORYTVC</h1>
            <p class="text-[10px] sm:text-xs font-bold tracking-widest uppercase text-brand-gold/70">IMPACT PARTNER PORTAL</p>
            <p id="restaurant-name-display" class="mt-4 sm:mt-6 text-gray-300 font-medium text-sm sm:text-base"></p>
        </div>

        <div id="redemption-section" class="p-5 sm:p-8">
            <label for="discount-code" class="block text-xs sm:text-sm font-semibold text-brand-gold/90 mb-2">Enter Customer Code</label>
            
            <div class="flex items-stretch w-full mb-5">
                <span class="flex items-center px-4 sm:px-5 bg-[#0d0d0d] border border-r-0 border-brand-gold-muted rounded-l-xl text-brand-gold/80 font-extrabold text-sm sm:text-base select-none">
                    IMPACT |
                </span>
                <input type="text" id="discount-code" placeholder="A1B2C" class="flex-1 px-4 sm:px-5 py-3 sm:py-4 text-base sm:text-lg font-bold border border-brand-gold-muted bg-[#0d0d0d] text-brand-gold rounded-r-xl focus:border-brand-gold uppercase transition-colors placeholder:text-brand-gold/30" autocomplete="off">
            </div>
            
            <button id="verify-btn" onclick="verifyCode()" class="w-full bg-brand-gold text-brand-base-black font-extrabold py-3 sm:py-4 px-4 sm:px-5 rounded-xl hover:bg-[#f0c970] transition duration-200 flex justify-center items-center h-12 sm:h-14 shadow-lg text-sm sm:text-base tracking-wide">
                <span id="verify-text">Verify Code</span>
                <span id="verify-loader" class="loader hidden"></span>
            </button>

            <div id="error-message" class="hidden mt-5 p-4 sm:p-5 bg-red-950/50 text-red-400 rounded-xl text-xs sm:text-sm font-medium border border-red-900"></div>
            
            <div id="result-card" class="hidden mt-6 sm:mt-8 border-t border-brand-gold-muted pt-6 sm:pt-8">
                <div class="flex justify-between items-start mb-4 sm:mb-5">
                    <div>
                        <p class="text-[10px] sm:text-xs text-brand-gold/60 uppercase font-bold tracking-wider mb-1">Customer Offer</p>
                        <p id="result-offer" class="text-lg sm:text-xl font-extrabold text-brand-gold"></p>
                    </div>
                    <span id="result-badge" class="px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-md tracking-wide"></span>
                </div>
                
                <p class="text-xs sm:text-sm text-gray-400 mb-6 sm:mb-8">Customer Email: <br><span id="result-customer" class="font-semibold text-brand-gold break-all"></span></p>
                
                <button id="redeem-btn" onclick="redeemCode()" class="w-full bg-brand-base-black text-brand-gold border border-brand-gold font-extrabold py-3 sm:py-4 px-4 sm:px-5 rounded-xl hover:bg-[#1a1a1a] transition duration-200 flex justify-center items-center h-12 sm:h-14 text-sm sm:text-base tracking-wide">
                    <span id="redeem-text">Mark as Redeemed</span>
                    <span id="redeem-loader" class="loader hidden" style="border-top-color: #e8c064;"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 1. PASTE YOUR GOOGLE SCRIPT URL BELOW 
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeuOI9M-8uSyinsShfSx09Ii2djMuXsd0oDO1W72TPH7H771IK3EsLMXA45JhqknDEjA/exec"; 
        
        // ==========================================
        // 🚨 2. TYPE THE RESTAURANT NAME EXACTLY AS IT APPEARS IN THE SPREADSHEET
        // ==========================================
        const RESTAURANT_NAME = "Demo Resto"; 

        
        // --- System Logic Below (No need to edit) ---
        let currentlyVerifiedCode = "";

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('restaurant-name-display').innerText = RESTAURANT_NAME;
        });

        async function verifyCode() {
            // Grab only the raw 5-character string the user types
            const rawInput = document.getElementById('discount-code').value.trim();
            const errorMsg = document.getElementById('error-message');
            const resultCard = document.getElementById('result-card');
            
            if (!rawInput) return;

            // Secretly glue "IMPACT-" to the front before sending it to the Bouncer!
            const codeInput = "IMPACT-" + rawInput.toUpperCase();

            errorMsg.classList.add('hidden');
            resultCard.classList.add('hidden');
            toggleLoading('verify-btn', 'verify-text', 'verify-loader', true, true);

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${codeInput}&restaurant=${RESTAURANT_NAME}&action=verify`);
                const data = await response.json();

                if (data.success) {
                    showResultCard(data.data, codeInput);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Network error. Please check your connection and try again.");
            } finally {
                toggleLoading('verify-btn', 'verify-text', 'verify-loader', false, true);
            }
        }

        async function redeemCode() {
            if (!currentlyVerifiedCode) return;

            const errorMsg = document.getElementById('error-message');
            toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', true, false);
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${currentlyVerifiedCode}&restaurant=${RESTAURANT_NAME}&action=redeem`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('result-badge').innerText = "REDEEMED";
                    document.getElementById('result-badge').className = "px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold border border-brand-gold-muted text-brand-gold/50 shadow-md";
                    document.getElementById('redeem-btn').style.display = 'none'; 
                    alert("Success! Code has been marked as redeemed.");
                    document.getElementById('discount-code').value = '';
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Network error. Please try again.");
            } finally {
                toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', false, false);
            }
        }

        function showResultCard(data, code) {
            currentlyVerifiedCode = code;
            document.getElementById('result-offer').innerText = data.offer;
            document.getElementById('result-customer').innerText = data.customer;
            
            const badge = document.getElementById('result-badge');
            const redeemBtn = document.getElementById('redeem-btn');
            
            if (data.status.toLowerCase() === 'valid') {
                badge.innerText = "VALID";
                badge.className = "px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold bg-[#143314] border border-green-700 text-green-400 shadow-md";
                redeemBtn.style.display = 'flex'; 
            } else if (data.status.toLowerCase() === 'redeemed') {
                badge.innerText = "ALREADY REDEEMED";
                badge.className = "px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold bg-[#1a1a1a] border border-gray-700 text-gray-400 shadow-md";
                redeemBtn.style.display = 'none'; 
            } else {
                badge.innerText = "EXPIRED";
                badge.className = "px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold bg-[#331414] border border-red-800 text-red-400 shadow-md";
                redeemBtn.style.display = 'none'; 
            }

            document.getElementById('result-card').classList.remove('hidden');
        }

        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.innerText = message;
            errorMsg.classList.remove('hidden');
        }

        function toggleLoading(btnId, textId, loaderId, isLoading, isPrimary) {
            const btnText = document.getElementById(textId);
            const loader = document.getElementById(loaderId);
            
            if (isLoading) {
                btnText.classList.add('hidden');
                loader.classList.remove('hidden');
                loader.style.borderTopColor = isPrimary ? '#141414' : '#e8c064';
            } else {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
