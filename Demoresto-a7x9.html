<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPACT Partner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #16A34A; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <div class="bg-gray-900 text-white p-6 text-center">
            <h1 class="text-2xl font-extrabold tracking-wider mb-1">FOODSTORYTVC</h1>
            <p class="text-sm text-green-500 font-semibold tracking-widest uppercase">IMPACT Partner Portal</p>
            <p id="restaurant-name-display" class="mt-4 text-gray-300 font-medium"></p>
        </div>

        <div id="redemption-section" class="p-6 sm:p-8">
            <label for="discount-code" class="block text-sm font-bold text-gray-700 mb-2">Enter Customer Code</label>
            <input type="text" id="discount-code" placeholder="e.g. IMPACT-A1B2C" class="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-xl focus:ring-green-600 focus:border-green-600 uppercase transition-colors" autocomplete="off">
            
            <button id="verify-btn" onclick="verifyCode()" class="mt-4 w-full bg-gray-900 text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-800 transition duration-200 flex justify-center items-center h-12">
                <span id="verify-text">Verify Code</span>
                <span id="verify-loader" class="loader hidden"></span>
            </button>

            <div id="error-message" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-xl text-sm font-medium border border-red-100"></div>
            
            <div id="result-card" class="hidden mt-6 border-t border-gray-100 pt-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Customer Offer</p>
                        <p id="result-offer" class="text-lg font-extrabold text-gray-900"></p>
                    </div>
                    <span id="result-badge" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                </div>
                
                <p class="text-sm text-gray-600 mb-6">Customer Email: <span id="result-customer" class="font-semibold text-gray-900"></span></p>
                
                <button id="redeem-btn" onclick="redeemCode()" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-green-700 transition duration-200 flex justify-center items-center h-12">
                    <span id="redeem-text">Mark as Redeemed</span>
                    <span id="redeem-loader" class="loader hidden" style="border-top-color: white;"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 1. PASTE YOUR GOOGLE SCRIPT URL BELOW 
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeuOI9M-8uSyinsShfSx09Ii2djMuXsd0oDO1W72TPH7H771IK3EsLMXA45JhqknDEjA/exec"; 
        
        // ==========================================
        // 🚨 2. TYPE THE RESTAURANT NAME EXACTLY AS IT APPEARS IN THE SPREADSHEET
        // ==========================================
        const RESTAURANT_NAME = "Demo Resto"; 

        
        // --- System Logic Below (No need to edit) ---
        let currentlyVerifiedCode = "";

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('restaurant-name-display').innerText = RESTAURANT_NAME;
        });

        async function verifyCode() {
            const codeInput = document.getElementById('discount-code').value.trim();
            const errorMsg = document.getElementById('error-message');
            const resultCard = document.getElementById('result-card');
            
            if (!codeInput) return;

            errorMsg.classList.add('hidden');
            resultCard.classList.add('hidden');
            toggleLoading('verify-btn', 'verify-text', 'verify-loader', true);

            try {
                // Now sends the hardcoded RESTAURANT_NAME to the Bouncer
                const response = await fetch(`${SCRIPT_URL}?code=${codeInput}&restaurant=${RESTAURANT_NAME}&action=verify`);
                const data = await response.json();

                if (data.success) {
                    showResultCard(data.data, codeInput);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Network error. Please check your connection and try again.");
            } finally {
                toggleLoading('verify-btn', 'verify-text', 'verify-loader', false);
            }
        }

        async function redeemCode() {
            if (!currentlyVerifiedCode) return;

            const errorMsg = document.getElementById('error-message');
            toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', true);
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${SCRIPT_URL}?code=${currentlyVerifiedCode}&restaurant=${RESTAURANT_NAME}&action=redeem`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('result-badge').innerText = "REDEEMED";
                    document.getElementById('result-badge').className = "px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500";
                    document.getElementById('redeem-btn').style.display = 'none'; 
                    alert("Success! Code has been marked as redeemed.");
                    document.getElementById('discount-code').value = '';
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Network error. Please try again.");
            } finally {
                toggleLoading('redeem-btn', 'redeem-text', 'redeem-loader', false);
            }
        }

        function showResultCard(data, code) {
            currentlyVerifiedCode = code;
            document.getElementById('result-offer').innerText = data.offer;
            document.getElementById('result-customer').innerText = data.customer;
            
            const badge = document.getElementById('result-badge');
            const redeemBtn = document.getElementById('redeem-btn');
            
            if (data.status.toLowerCase() === 'valid') {
                badge.innerText = "VALID";
                badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700";
                redeemBtn.style.display = 'flex'; 
            } else if (data.status.toLowerCase() === 'redeemed') {
                badge.innerText = "ALREADY REDEEMED";
                badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500";
                redeemBtn.style.display = 'none'; 
            } else {
                badge.innerText = "EXPIRED";
                badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700";
                redeemBtn.style.display = 'none'; 
            }

            document.getElementById('result-card').classList.remove('hidden');
        }

        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.innerText = message;
            errorMsg.classList.remove('hidden');
        }

        function toggleLoading(btnId, textId, loaderId, isLoading) {
            const btnText = document.getElementById(textId);
            const loader = document.getElementById(loaderId);
            if (isLoading) {
                btnText.classList.add('hidden');
                loader.classList.remove('hidden');
            } else {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
